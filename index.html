<!DOCTYPE html>
<html>
<head>
    <title>Invoice Generator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 50px;
            font-size: 40px;
        }

        .container {
            margin-top: 50px;
        }

        a {
            display: inline-block;
            margin: 15px;
            padding: 15px 30px;
            text-decoration: none;
            color: #333;
            background: white;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background: #ffd369;
            color: black;
            transform: scale(1.05);
        }
    </style>

</head>

<body>

    <h1>🚀 Invoice Generator</h1>

    <div class="container">
        <a href="/excel">📊 Upload Excel</a><br>
        <a href="/manual">✍️ Manual Entry</a><br>
        <a href="/screenshot">📱 Upload Screenshot</a>
    </div>

</body>
</html>
